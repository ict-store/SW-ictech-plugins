name: Daily QA Audit

on:
  schedule:
    # Runs daily at 11:00 AM IST (5:30 AM UTC)
    - cron: '30 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  qa-audit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        plugin:
          - name: ICTECH_ListGridView
            repo: ict-store/ICTECH_ListGridView
            version: v4.0.3
            author: iCreativetechnologies

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Clone plugin repo
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ matrix.plugin.repo }}.git plugin-source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run QA Audit
        env:
          QA_OUTPUT: qa-result.json
        run: |
          python scripts/qa-audit.py plugin-source

      - name: Generate Report & Update Dashboard
        run: |
          PLUGIN_NAME="${{ matrix.plugin.name }}"
          VERSION="${{ matrix.plugin.version }}"
          AUTHOR="${{ matrix.plugin.author }}"
          REPO_URL="https://github.com/${{ matrix.plugin.repo }}"

          python scripts/generate-report.py qa-result.json \
            --plugin-name "$PLUGIN_NAME" \
            --version "$VERSION" \
            --author "$AUTHOR" \
            --repo-url "$REPO_URL" \
            --index-path index.html

      - name: Read score
        id: score
        run: |
          SCORE=$(python -c "import json; d=json.load(open('qa-result.json')); print(d['score'])")
          GRADE=$(python -c "import json; d=json.load(open('qa-result.json')); print(d['grade'])")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "Plugin: ${{ matrix.plugin.name }} — Score: $SCORE/100 Grade: $GRADE"

      - name: Commit & Push if changed
        run: |
          git config user.email "raj@icreativetechnologies.com"
          git config user.name "Raj@Bam1311"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "QA Audit: ${{ matrix.plugin.name }} — ${{ steps.score.outputs.score }}/100 Grade ${{ steps.score.outputs.grade }} ($(date +%Y-%m-%d))"
            git push
            echo "Dashboard updated!"
          fi

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "QA Audit: ${{ matrix.plugin.name }} — ${{ steps.score.outputs.score }}/100 Grade ${{ steps.score.outputs.grade }}"
          to: raj@icreativetechnologies.com
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
              <h2 style="color: #0f172a; margin-bottom: 4px;">Shopware QA Audit Report</h2>
              <p style="color: #64748b; margin-top: 0;">Daily automated audit — ${{ steps.score.outputs.score }}/100</p>
              <hr style="border: none; border-top: 1px solid #e2e8f0;">

              <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
                <tr>
                  <td style="padding: 8px 12px; color: #64748b;">Plugin</td>
                  <td style="padding: 8px 12px; font-weight: 600;">${{ matrix.plugin.name }}</td>
                </tr>
                <tr style="background: #f8fafc;">
                  <td style="padding: 8px 12px; color: #64748b;">Version</td>
                  <td style="padding: 8px 12px;">${{ matrix.plugin.version }}</td>
                </tr>
                <tr>
                  <td style="padding: 8px 12px; color: #64748b;">Score</td>
                  <td style="padding: 8px 12px; font-weight: 700; font-size: 1.2em;">${{ steps.score.outputs.score }}/100</td>
                </tr>
                <tr style="background: #f8fafc;">
                  <td style="padding: 8px 12px; color: #64748b;">Grade</td>
                  <td style="padding: 8px 12px;"><span style="background: ${{ steps.score.outputs.grade == 'A' && '#22c55e' || steps.score.outputs.grade == 'B' && '#3b82f6' || '#f59e0b' }}; color: white; padding: 4px 12px; border-radius: 6px; font-weight: 700;">${{ steps.score.outputs.grade }}</span></td>
                </tr>
                <tr>
                  <td style="padding: 8px 12px; color: #64748b;">Date</td>
                  <td style="padding: 8px 12px;">${{ steps.score.outputs.score && github.event.repository.updated_at || 'today' }}</td>
                </tr>
              </table>

              <p style="margin: 16px 0;">
                <a href="https://ict-store.github.io/SW-ictech-plugins/" style="background: #3b82f6; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600;">View Dashboard</a>
                &nbsp;&nbsp;
                <a href="https://github.com/${{ matrix.plugin.repo }}" style="color: #3b82f6; text-decoration: none; font-weight: 500;">View Repository</a>
              </p>

              <hr style="border: none; border-top: 1px solid #e2e8f0;">
              <p style="color: #94a3b8; font-size: 0.8em;">Generated by iCreativetechnologies QA Audit</p>
            </div>

      - name: Cleanup
        run: rm -rf plugin-source qa-result.json
